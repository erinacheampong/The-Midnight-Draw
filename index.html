<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Midnight Draw — immersive tarot card readings for gatherings and celebrations in Southern California." />
  <title>The Midnight Draw | Tarot Readings</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background:#050407; }
    body { margin:0; background:#050407; }
    main { width:100%; overflow:hidden; }
    .section { position:relative; width:100%; line-height:0; background:#050407; }
    .section img { display:block; width:100%; height:auto; }
    .click-area { position:absolute; display:block; z-index:3; border-radius:12px; }
    .click-area:focus-visible { outline:3px solid #d3ad68; outline-offset:4px; }
    .hero .click-area { left:9.5%; top:75%; width:37%; height:10%; }
    .booking .click-area { left:12.5%; top:64%; width:38%; height:13%; }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    @media (max-width:700px) {
      .hero .click-area { left:9%; top:74%; width:39%; height:11%; }
      .booking .click-area { left:11%; top:62%; width:42%; height:15%; }
    }
  </style>
</head>
<body>
  <main>
    <section class="section hero" aria-label="The Midnight Draw hero">
      <img src="assets/01-hero.png" alt="The Midnight Draw immersive tarot card readings" />
      <a class="click-area" href="https://forms.gle/REPLACE-WITH-YOUR-FORM-LINK" target="_blank" rel="noopener" aria-label="Book a tarot reading"><span class="sr-only">Book a Reading</span></a>
    </section>

    <section class="section" aria-label="What to expect">
      <img src="assets/02-what-to-expect.png" alt="Reflection, connection, and a little magic" loading="lazy" />
    </section>

    <section class="section" aria-label="Tarot experiences">
      <img src="assets/03-offerings.png" alt="Tarot experiences for private events, girls nights, themed gatherings, and community markets" loading="lazy" />
    </section>

    <section class="section booking" aria-label="Booking inquiry">
      <img src="assets/04-booking.png" alt="Invite The Midnight Draw to your gathering" loading="lazy" />
      <a class="click-area" href="https://forms.gle/REPLACE-WITH-YOUR-FORM-LINK" target="_blank" rel="noopener" aria-label="Open booking inquiry form"><span class="sr-only">Booking Inquiry</span></a>
    </section>

    <section class="section" aria-label="Connect with The Midnight Draw">
      <a href="https://www.instagram.com/themidnightdraw/" target="_blank" rel="noopener">
        <img src="assets/05-footer.png" alt="Follow The Midnight Draw on Instagram at @themidnightdraw" loading="lazy" />
      </a>
    </section>
  </main>
</body>
</html>
