<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The Midnight Draw</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #050305;
    }

    .site-section {
      position: relative;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      line-height: 0;
      background: #050305;
    }

    .site-section img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
    }

    .clickable-area {
      position: absolute;
      display: block;
      z-index: 10;
      cursor: pointer;
    }

    /* Book a Reading button on the hero image */
    .hero-button {
      left: 7%;
      top: 72%;
      width: 43%;
      height: 16%;
    }

    /* Booking Inquiry button */
    .booking-button {
      left: 12%;
      top: 63%;
      width: 41%;
      height: 17%;
    }

    /* Instagram handle on the footer */
    .instagram-link {
      left: 49%;
      top: 49%;
      width: 45%;
      height: 28%;
    }

    .clickable-area:focus {
      outline: 3px solid #c7a15a;
      outline-offset: 4px;
    }

    @media (max-width: 768px) {
      .hero-button {
        left: 6%;
        top: 71%;
        width: 46%;
        height: 17%;
      }

      .booking-button {
        left: 10%;
        top: 61%;
        width: 45%;
        height: 19%;
      }

      .instagram-link {
        left: 44%;
        top: 46%;
        width: 52%;
        height: 32%;
      }
    }
  </style>
</head>

<body>

  <main>

    <section class="site-section" aria-label="The Midnight Draw hero section">
      <img
        src="01-hero.png"
        alt="The Midnight Draw immersive tarot card readings"
      >

      <a
        class="clickable-area hero-button"
        href="https://docs.google.com/forms/d/1lrY9YQhbOERRz8XalJhhrEcg9tV4-FdmHXdwyLssKE8/viewform"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Book a tarot reading"
      ></a>
    </section>

    <section class="site-section" aria-label="What to expect">
      <img
        src="02-what-to-expect.png"
        alt="What to expect from The Midnight Draw tarot readings"
      >
    </section>

    <section class="site-section" aria-label="Tarot experiences and offerings">
      <img
        src="03-offerings.png"
        alt="Tarot experiences including private events, girls nights, themed gatherings, and community markets"
      >
    </section>

    <section class="site-section" aria-label="Booking inquiry">
      <img
        src="04-booking.png"
        alt="Invite The Midnight Draw to your gathering"
      >

      <a
        class="clickable-area booking-button"
        href="https://docs.google.com/forms/d/1lrY9YQhbOERRz8XalJhhrEcg9tV4-FdmHXdwyLssKE8/viewform"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open The Midnight Draw booking inquiry form"
      ></a>
    </section>

    <footer class="site-section" aria-label="The Midnight Draw contact information">
      <img
        src="05-footer.png"
        alt="Connect with The Midnight Draw on Instagram"
      >

      <a
        class="clickable-area instagram-link"
        href="https://www.instagram.com/themidnightdraw/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Visit The Midnight Draw on Instagram"
      ></a>
    </footer>

  </main>

</body>
</html>
